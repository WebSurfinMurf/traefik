# traefik.yml

# Global log level
log:
  level: INFO

# API and Dashboard
api:
  insecure: true
  dashboard: true

# Metrics (Prometheus)
metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true

# Entrypoints
entryPoints:
  web:
    address: ":80"
    # This block creates a global, permanent redirect from HTTP to HTTPS
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
  metrics:
    address: ":9100"

# Providers
providers:
  docker:
    exposedByDefault: false
    network: traefik-proxy

# Certificate Resolvers (Let's Encrypt)
certificatesResolvers:
  letsencrypt:
    acme:
      storage: /acme.json
      caServer: "https://acme-v02.api.letsencrypt.org/directory"
      httpChallenge:
        entryPoint: web
