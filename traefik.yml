# traefik.yml

## Global Logging
log:
  level: INFO

## API & Dashboard
api:
  dashboard: true
  insecure: true

## Metrics (Prometheus)
metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true

## Entrypoints
entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
  metrics:
    address: ":9100"
  traefik:
    address: ":8083"

## Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: "traefik-proxy"
  file:
    filename: /etc/traefik/redirect.yml
    watch: true

## Certificate Resolvers (Let's Encrypt)
certificatesResolvers:
  letsencrypt:
    acme:
      email: "websurfinmurf@gmail.com"
      storage: "/etc/traefik/acme.json"
      httpChallenge:
        entryPoint: web
