# traefik.yml

# Global log level
log:
  level: INFO # Set log level directly

# API and Dashboard
api:
  insecure: true # Warning: Do not expose this to the internet without authentication
  dashboard: true

# Metrics (Prometheus)
metrics:
  prometheus:
    entryPoint: metrics # Use the dedicated metrics entrypoint
    addEntryPointsLabels: true

# Entrypoints
entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
  metrics:
    address: ":9100"

# Providers
providers:
  docker:
    exposedByDefault: false # Recommended to explicitly enable services
    network: traefik-proxy # Network for Traefik to watch

# Certificate Resolvers (Let's Encrypt)
certificatesResolvers:
  letsencrypt:
    acme:
      # The email is now provided by an environment variable, so this line is removed.
      storage: /acme.json
      caServer: "https://acme-v02.api.letsencrypt.org/directory"
      httpChallenge:
        entryPoint: web
