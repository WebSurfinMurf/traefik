# redirect.yml

http:
  routers:
    # Let Let's Encrypt HTTP-01 challenges through on port 80
    acme-challenge-router:
      rule: "PathPrefix(`/.well-known/acme-challenge`)"
      entryPoints:
        - web
      service: noop@internal

    # Only redirect the public host to HTTPS
    redirect-router:
      rule: "Host(`embracenow.asuscomm.com`)"
      entryPoints:
        - web
      middlewares:
        - https-redirect
      service: noop@internal

  middlewares:
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true
