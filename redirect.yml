http:
  routers:
    acme-challenge-router:
      rule: "PathPrefix(`/.well-known/acme-challenge`)"
      entryPoints:
        - web
      service: noop@internal

    redirect-router:
      rule: "Host(`embracenow.asuscomm.com`)"
      entryPoints:
        - web
      middlewares:
        - https-redirect
      service: noop@internal

    keycloak-internal-http:
      rule: "Host(`linuxserver.lan`) && PathPrefix(`/keycloak`)"
      entryPoints:
        - web
      service: keycloak-service
      middlewares:
        - internal-whitelist
        - strip-hsts
        - keycloak-stripprefix

  middlewares:
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    internal-whitelist:
      ipWhiteList:
        sourceRange:
          - "192.168.1.0/24"

    strip-hsts:
      headers:
        # TRAEFIK v3 renamed this field:
        removeResponseHeader:
          - Strict-Transport-Security

    keycloak-stripprefix:
      stripPrefix:
        prefixes:
          - "/keycloak"
