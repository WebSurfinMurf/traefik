# redirect.yml

http:
  routers:
    # 1) Let Let's Encrypt HTTP-01 challenges through on port 80
    acme-challenge-router:
      rule: "PathPrefix(`/.well-known/acme-challenge`)"
      entryPoints:
        - web
      service: noop@internal

    # 2) Only redirect the public host to HTTPS
    redirect-router:
      rule: "Host(`embracenow.asuscomm.com`)"
      entryPoints:
        - web
      middlewares:
        - https-redirect
      service: noop@internal

    # 3) Your internal Keycloak HTTP entrypoint,
    #    but guard it so only LAN clients can reach it
    keycloak-internal-http:
      rule: "Host(`keycloak.linuxserver.lan`)"
      entryPoints:
        - web
      service: keycloak-service
      middlewares:
        - internal-whitelist

  middlewares:
    # a) standard HTTPS redirect
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    # b) only allow requests from your 192.168.1.0/24 LAN
    internal-whitelist:
      ipWhiteList:
        sourceRange:
          - "192.168.1.0/24"
