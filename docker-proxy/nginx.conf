worker_processes 1;
user root;
error_log /dev/stderr warn;
events { worker_connections 128; }
http {
    access_log off;
    upstream docker { server unix:/var/run/docker.sock; }
    server {
        listen 2375;
        # Strip /v1.XX/ prefix — Docker 29 rejects <1.44, but versionless works
        location ~ ^/v[0-9.]+/(.*)$ {
            proxy_pass http://docker/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_read_timeout 3600s;
        }
        location / {
            proxy_pass http://docker;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_read_timeout 3600s;
        }
    }
}
